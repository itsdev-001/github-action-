name: Docker build & push

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:

  build-and-push:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: devpratapsingh
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            devpratapsingh/github-actions-app:${{ github.ref_name }}
            devpratapsingh/github-actions-app:latest
            devpratapsingh/github-actions-app:${{ github.sha }}
